<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" role="img" aria-label="UptimeStatus monitors dashboard — all systems operational">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0b0f0d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <style>
    .card { fill: #ffffff; }
    .stroke { stroke: rgba(11,15,13,0.10); }
    .chrome { fill: #f4f5f2; }
    .fg { fill: #0b0f0d; }
    .muted { fill: #5c6864; }
    .divider { stroke: rgba(11,15,13,0.07); stroke-width: 1; }
    .track { fill: #eceeea; }
    .traffic { fill: #d3d7d1; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #101413; }
      .stroke { stroke: rgba(255,255,255,0.12); }
      .chrome { fill: #161b19; }
      .fg { fill: #f2f5f3; }
      .muted { fill: #97a39d; }
      .divider { stroke: rgba(255,255,255,0.07); }
      .track { fill: #20261f; }
      .traffic { fill: #2c332c; }
    }
    .green { fill: #10b981; }
    .amber { fill: #f59e0b; }
    .ok { fill: #10b981; }
    .accent { fill: #2563eb; }
    .banner { fill: rgba(16,185,129,0.13); }
    .bannerText { fill: #059669; }
    text { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect class="card stroke" x="8" y="8" width="464" height="384" rx="20" stroke-width="1.5" filter="url(#cardShadow)"/>

  <!-- browser chrome -->
  <circle class="traffic" cx="34" cy="34" r="5"/>
  <circle class="traffic" cx="52" cy="34" r="5"/>
  <circle class="traffic" cx="70" cy="34" r="5"/>
  <rect class="chrome" x="94" y="23" width="230" height="22" rx="11"/>
  <text class="muted mono" x="106" y="38" font-size="11">status.uptime-status.org</text>
  <line class="divider" x1="8" y1="60" x2="472" y2="60"/>

  <!-- operational banner -->
  <rect class="banner" x="26" y="76" width="426" height="40" rx="11"/>
  <circle class="ok" cx="46" cy="96" r="5"/>
  <text class="bannerText" x="62" y="101" font-size="14" font-weight="700">All systems operational</text>

  
  <g>
    <circle class="ok" cx="44" cy="150" r="5"/>
    <text class="fg" x="60" y="147" font-size="14" font-weight="600">Website</text>
    <text class="muted mono" x="60" y="163" font-size="10.5">uptime-status.org</text>
    <rect class="green" x="250" y="140" width="6" height="20" rx="2"/><rect class="green" x="260" y="140" width="6" height="20" rx="2"/><rect class="green" x="270" y="140" width="6" height="20" rx="2"/><rect class="green" x="280" y="140" width="6" height="20" rx="2"/><rect class="green" x="290" y="140" width="6" height="20" rx="2"/><rect class="green" x="300" y="140" width="6" height="20" rx="2"/><rect class="amber" x="310" y="140" width="6" height="20" rx="2"/><rect class="green" x="320" y="140" width="6" height="20" rx="2"/><rect class="green" x="330" y="140" width="6" height="20" rx="2"/><rect class="green" x="340" y="140" width="6" height="20" rx="2"/>
    <text class="muted mono" x="452" y="153" font-size="12" text-anchor="end">132 ms</text>
  </g><line class="divider" x1="26" y1="181" x2="452" y2="181"/>
  <g>
    <circle class="ok" cx="44" cy="212" r="5"/>
    <text class="fg" x="60" y="209" font-size="14" font-weight="600">Public API</text>
    <text class="muted mono" x="60" y="225" font-size="10.5">api.uptime-status.org</text>
    <rect class="green" x="250" y="202" width="6" height="20" rx="2"/><rect class="green" x="260" y="202" width="6" height="20" rx="2"/><rect class="green" x="270" y="202" width="6" height="20" rx="2"/><rect class="amber" x="280" y="202" width="6" height="20" rx="2"/><rect class="green" x="290" y="202" width="6" height="20" rx="2"/><rect class="green" x="300" y="202" width="6" height="20" rx="2"/><rect class="green" x="310" y="202" width="6" height="20" rx="2"/><rect class="green" x="320" y="202" width="6" height="20" rx="2"/><rect class="amber" x="330" y="202" width="6" height="20" rx="2"/><rect class="green" x="340" y="202" width="6" height="20" rx="2"/>
    <text class="muted mono" x="452" y="215" font-size="12" text-anchor="end">89 ms</text>
  </g><line class="divider" x1="26" y1="243" x2="452" y2="243"/>
  <g>
    <circle class="ok" cx="44" cy="274" r="5"/>
    <text class="fg" x="60" y="271" font-size="14" font-weight="600">Database</text>
    <text class="muted mono" x="60" y="287" font-size="10.5">primary cluster</text>
    <rect class="green" x="250" y="264" width="6" height="20" rx="2"/><rect class="green" x="260" y="264" width="6" height="20" rx="2"/><rect class="green" x="270" y="264" width="6" height="20" rx="2"/><rect class="green" x="280" y="264" width="6" height="20" rx="2"/><rect class="green" x="290" y="264" width="6" height="20" rx="2"/><rect class="green" x="300" y="264" width="6" height="20" rx="2"/><rect class="green" x="310" y="264" width="6" height="20" rx="2"/><rect class="green" x="320" y="264" width="6" height="20" rx="2"/><rect class="green" x="330" y="264" width="6" height="20" rx="2"/><rect class="green" x="340" y="264" width="6" height="20" rx="2"/>
    <text class="muted mono" x="452" y="277" font-size="12" text-anchor="end">100%</text>
  </g><line class="divider" x1="26" y1="305" x2="452" y2="305"/>
  <g>
    <circle class="ok" cx="44" cy="336" r="5"/>
    <text class="fg" x="60" y="333" font-size="14" font-weight="600">CDN &amp; DNS</text>
    <text class="muted mono" x="60" y="349" font-size="10.5">A, MX, CNAME</text>
    <rect class="green" x="250" y="326" width="6" height="20" rx="2"/><rect class="green" x="260" y="326" width="6" height="20" rx="2"/><rect class="green" x="270" y="326" width="6" height="20" rx="2"/><rect class="green" x="280" y="326" width="6" height="20" rx="2"/><rect class="amber" x="290" y="326" width="6" height="20" rx="2"/><rect class="green" x="300" y="326" width="6" height="20" rx="2"/><rect class="green" x="310" y="326" width="6" height="20" rx="2"/><rect class="green" x="320" y="326" width="6" height="20" rx="2"/><rect class="green" x="330" y="326" width="6" height="20" rx="2"/><rect class="green" x="340" y="326" width="6" height="20" rx="2"/>
    <text class="muted mono" x="452" y="339" font-size="12" text-anchor="end">OK</text>
  </g>
</svg>
