name: CI

on:
  push:
    branches:
      - main # deploys to prod (single Hetzner box, see deploy-prod below)

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun buddy lint

  typecheck:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: bun install

      # Gate on APP code only. The vendored framework under
      # storage/framework/core/ has long-standing type errors that are
      # upstream's to fix (they leak in via the tsconfig `paths` mapping
      # even though the directory is excluded), and gating on them meant
      # this job was permanently red and deploys never ran.
      - name: Typecheck (app code)
        run: |
          bunx --bun tsc --noEmit 2>&1 | tee /tmp/tsc.log || true
          if grep "error TS" /tmp/tsc.log | grep -v "^storage/framework/" | grep -q .; then
            echo "App-code type errors:"
            grep "error TS" /tmp/tsc.log | grep -v "^storage/framework/"
            exit 1
          fi
          echo "App code typechecks clean ($(grep -c 'error TS' /tmp/tsc.log || true) pre-existing framework errors ignored)"

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306

      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install

      - name: Test Suite
        env:
          AWS_DYNAMODB_ENDPOINT: http://localhost:8000
        run: bun run test

  release-check:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      contains_release: ${{ steps.check_release.outputs.contains_release }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Release Check
        id: check_release
        run: |
          # Subject line ONLY (%s, not %B): the intent is to skip deploys for
          # bumpx-style "chore: release vX.Y.Z" commits. Matching the whole
          # body silently skipped deploys for any commit whose description
          # merely mentioned the word (e.g. "per-release systemd units") —
          # which is how 06e811a and 2d169c9 never shipped.
          if git log --format=%s -n 1 "${{ github.event.after }}" | grep -qi 'release'; then
            echo "contains_release=1" >> "$GITHUB_OUTPUT"
          else
            echo "contains_release=0" >> "$GITHUB_OUTPUT"
          fi

  # Push-to-deploy: every green push to main ships to the Hetzner box via
  # `buddy deploy production` (the same ts-cloud-backed path as a manual
  # deploy from a laptop). The `environment:` block makes GitHub record
  # this run under the repo's Deployments tab natively — which is exactly
  # why buddy's own GitHub-Deployments integration skips itself inside
  # Actions (see runHetznerDeploy/githubDeploymentsEnabled in buddy's
  # deploy command): recording it here too would duplicate.
  #
  # Required repo secrets (deploy is skipped with a notice until set):
  #   HCLOUD_TOKEN                    Hetzner Cloud API token
  #   DEPLOY_SSH_PRIVATE_KEY          ed25519 key whose pub key is on the box
  #                                   (deploy connects as root@<server-ip>)
  #   DOTENV_PRIVATE_KEY_PRODUCTION   decrypts the committed .env.production
  #                                   (from the local .env.keys file)
  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-check.outputs.contains_release == '0'
    needs: [lint, typecheck, test, release-check]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://uptime-status.org
    # One deploy at a time; a second push queues instead of racing the
    # first one onto the same box (deploys take ~25-30 minutes).
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install

      # buddy's CLI bootstrap loads a root .env; production values come
      # from the committed (encrypted) .env.production at deploy time,
      # so example values here are fine and never reach the server.
      - name: Ensure .env Set
        run: cp .env.example .env

      - name: Check Deploy Secrets
        id: deploy-secrets
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
        run: |
          missing=""
          [ -z "$HCLOUD_TOKEN" ] && missing="$missing HCLOUD_TOKEN"
          [ -z "$DEPLOY_SSH_PRIVATE_KEY" ] && missing="$missing DEPLOY_SSH_PRIVATE_KEY"
          [ -z "$DOTENV_PRIVATE_KEY_PRODUCTION" ] && missing="$missing DOTENV_PRIVATE_KEY_PRODUCTION"
          if [ -n "$missing" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping production deploy - missing repo secret(s):$missing"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      # buddy deploy connects as root@<server-ip> with the default ssh
      # identity (no -i flag) and reads ~/.ssh/id_ed25519.pub during
      # provisioning, so both halves of the keypair go to the default
      # paths. StrictHostKeyChecking=accept-new is set by buddy itself.
      - name: Set up SSH Key
        if: steps.deploy-secrets.outputs.available == 'true'
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub

      # ./buddy (the sh wrapper), NOT `bun buddy`: the wrapper bootstraps
      # pantry and puts pantry/.bin on PATH before the CLI runs. The bare
      # CLI's own pantry bootstrap installs pantry but then can't find it
      # on PATH in a fresh runner and dies with a silent exit 1.
      - name: Deploy
        if: steps.deploy-secrets.outputs.available == 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
        run: ./buddy deploy production --yes

  publish-commit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish Commit
        run: ./storage/framework/scripts/publish-commit
